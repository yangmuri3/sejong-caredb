<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세종시 통합돌봄 자원찾기</title>
<style>
:root{
  --navy:#16224e;
  --navy-deep:#0c1433;
  --magenta:#c81f5e;
  --magenta-deep:#9c1348;
  --cream:#f6f4ee;
  --paper:#ffffff;
  --ink:#1c1e29;
  --sub:#6b7080;
  --faint:#9599a8;
  --line:#e7e4dc;
  --ok:#177245;
  --ok-bg:#eaf5ee;
  --warn-bg:#fdf3e3;
  --warn-line:#e0a53f;
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--cream);color:var(--ink);min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:0 20px 70px;}

/* ---------- sticky top bar ---------- */
.topbar{position:sticky;top:0;z-index:40;background:var(--navy-deep);display:none;}
.topbar.show{display:block;}
.topbar-inner{max-width:820px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px;}
.brandmark{display:flex;align-items:center;gap:9px;flex:none;cursor:pointer;}
.brandmark .stripe{width:5px;height:22px;border-radius:3px;background:var(--magenta);}
.brandmark b{color:#fff;font-size:13.5px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;}
.searchbar{flex:1;display:flex;align-items:center;gap:8px;background:#fff;border-radius:9px;padding:9px 10px 9px 12px;}
.searchbar svg{flex:none;color:var(--faint);}
.searchbar input{flex:1;border:none;outline:none;font-size:13.4px;color:var(--ink);background:transparent;min-width:0;}
.searchbar button{flex:none;border:none;background:var(--magenta);color:#fff;font-weight:700;font-size:12.5px;padding:8px 15px;border-radius:7px;cursor:pointer;}
.searchbar button:hover{background:var(--magenta-deep);}

/* ---------- hero ---------- */
.hero{padding:0 0 8px;}
.heroband{
  background:var(--navy);color:#fff;border-radius:0 0 22px 22px;
  padding:44px 20px 40px;text-align:center;margin:0 -20px 26px;
}
.hero-kicker{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#e7a9c2;margin:0 0 14px;}
.hero h1{font-size:clamp(23px,4.6vw,30px);font-weight:800;line-height:1.4;margin:0 0 10px;letter-spacing:-.01em;}
.hero p.lead{color:#c3c8de;font-size:13.5px;max-width:460px;margin:0 auto 26px;line-height:1.6;}

.herosearch{
  max-width:540px;margin:0 auto;background:var(--paper);border-radius:14px;
  padding:6px 6px 6px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 14px 30px rgba(0,0,0,.22);
}
.herosearch svg{flex:none;color:var(--navy);}
.herosearch input{flex:1;border:none;outline:none;background:transparent;font-size:14.5px;color:var(--ink);padding:11px 0;min-width:0;}
.herosearch input::placeholder{color:#a7abbd;}
.herosearch button{flex:none;border:none;background:var(--magenta);color:#fff;font-weight:700;font-size:13.5px;padding:11px 18px;border-radius:10px;cursor:pointer;}
.herosearch button:hover{background:var(--magenta-deep);}

.stat-inline{display:flex;justify-content:center;gap:26px;margin-top:22px;flex-wrap:wrap;}
.stat-inline .s{text-align:center;}
.stat-inline .s b{display:block;color:#fff;font-size:17px;font-weight:800;}
.stat-inline .s span{color:#a9aec6;font-size:10.5px;}

/* examples */
.examples{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin:0 auto 30px;max-width:600px;}
.exchip{
  background:#fff;border:1px solid var(--line);color:var(--navy);
  font-size:12px;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;
}
.exchip:hover{background:var(--navy);color:#fff;border-color:var(--navy);}

/* category list — flat, single tone */
.catsection h3{font-size:12.5px;font-weight:700;color:var(--sub);letter-spacing:.02em;margin:0 0 12px;text-transform:uppercase;}
.tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:34px;}
.tile{
  border:1px solid var(--line);background:#fff;border-radius:12px;padding:14px 6px 11px;
  display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;text-align:center;
}
.tile:hover{border-color:var(--navy);background:#fbfaf7;}
.tile .ic{width:32px;height:32px;border-radius:9px;background:#eef0f6;color:var(--navy);display:flex;align-items:center;justify-content:center;}
.tile span{font-size:11px;font-weight:700;color:var(--ink);line-height:1.3;}
.tile small{font-size:9.5px;color:var(--faint);font-weight:600;}
@media(max-width:600px){ .tiles{grid-template-columns:repeat(3,1fr);} }

.pii-strip{text-align:center;font-size:11px;color:var(--faint);margin-bottom:6px;}

/* ---------- results ---------- */
.results{display:none;padding-top:24px;}
.results.show{display:block;}
.results-head{margin-bottom:14px;}
.results-head .q{font-size:11px;color:var(--faint);font-weight:700;letter-spacing:.03em;text-transform:uppercase;}
.results-head h2{margin:4px 0 0;font-size:18px;font-weight:800;color:var(--navy);}
.homelink{display:inline-flex;align-items:center;gap:5px;margin-top:8px;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;}
.homelink:hover{color:var(--navy);}

.facetbar{
  display:flex;gap:14px;flex-wrap:wrap;align-items:center;
  padding:12px 0;margin-bottom:6px;border-bottom:1px solid var(--line);
}
.facetbar label{font-size:12px;color:var(--sub);font-weight:600;display:flex;align-items:center;gap:6px;}
.facetbar select{border:1px solid var(--line);border-radius:7px;padding:5px 8px;font-size:12px;color:var(--ink);background:#fff;}
.facetbar .chk{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink);font-weight:600;cursor:pointer;}
.facetbar .chk input{accent-color:var(--magenta);width:14px;height:14px;}

.recentbar{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 2px;}
.recentbar span.lbl{font-size:11px;color:var(--faint);font-weight:600;align-self:center;margin-right:2px;}
.rchip{background:#fff;border:1px solid var(--line);color:var(--sub);font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;cursor:pointer;}
.rchip:hover{border-color:var(--navy);color:var(--navy);}

.warn-box{background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:10px;padding:11px 13px;font-size:12.4px;line-height:1.6;color:#6f4d10;margin:14px 0;}
.warn-box b{color:#4f350a;}

.empty-box{text-align:center;padding:44px 20px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-top:14px;}
.empty-box .bigicon{color:var(--line);margin-bottom:10px;}
.empty-box h4{margin:0 0 6px;font-size:14.5px;color:var(--ink);}
.empty-box p{margin:0;font-size:12.3px;color:var(--sub);line-height:1.6;}

.result-count{font-size:12px;color:var(--sub);margin:14px 0 14px;}
.result-count b{color:var(--ink);}

/* ---- clean result card ---- */
.cards{display:flex;flex-direction:column;gap:14px;}
.rcard{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
.rcard-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:2px;}
.rcard-rank{
  font-size:11px;font-weight:700;color:var(--navy);background:#eef0f6;
  border-radius:6px;padding:2px 8px;flex:none;
}
.rcard-cat{font-size:11px;color:var(--faint);font-weight:600;}
.rcard-title{font-size:16.5px;font-weight:800;color:var(--ink);margin:6px 0 4px;}
.rcard-match{font-size:11.5px;color:var(--ok);font-weight:600;margin-bottom:12px;}

table.fields{width:100%;border-collapse:collapse;}
table.fields tr{border-top:1px solid var(--line);}
table.fields tr:first-child{border-top:none;}
table.fields th{
  width:100px;text-align:left;vertical-align:top;padding:8px 10px 8px 0;
  font-size:11.5px;color:var(--sub);font-weight:700;white-space:nowrap;
}
table.fields td{padding:8px 0;font-size:13px;color:var(--ink);line-height:1.55;vertical-align:top;}
td.pay-free{color:var(--ok);font-weight:700;}
td.pay-paid{color:#a34b1a;font-weight:700;}
td.check{color:#8a6d1f;font-size:12px;}
.tel-link{color:var(--navy);font-weight:700;text-decoration:none;border-bottom:1px solid var(--navy);}

.foot-note{margin:18px 0 4px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:11.5px;color:var(--sub);line-height:1.6;background:#fff;}
.morehint{font-size:12px;color:var(--sub);text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div class="topbar" id="topbar">
  <div class="topbar-inner">
    <div class="brandmark" id="brandHome"><div class="stripe"></div><b>통합돌봄 자원찾기</b></div>
    <div class="searchbar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
      <input id="topInput" type="text" placeholder="지역 · 대상 · 서비스로 검색" />
      <button id="topSendBtn">검색</button>
    </div>
  </div>
</div>

<div class="wrap">
  <section class="hero" id="hero">
    <div class="heroband">

      <div class="herosearch">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
        <input id="heroInput" type="text" placeholder="예) 조치원읍 방문진료 가능한 기관" />
        <button id="heroSendBtn">검색</button>
      </div>

      <div class="stat-inline">
        <div class="s"><b id="dbCount">0</b><span>등록 자원(건)</span></div>
        <div class="s"><b>15</b><span>서비스 분야</span></div>
        <div class="s"><b>2026</b><span>자료 기준연도</span></div>
      </div>
    </div>

    <div class="examples" id="examples"></div>

    <div class="catsection">
      <h3>분야별로 바로 찾기</h3>
      <div class="tiles" id="tiles"></div>
    </div>
    <p class="pii-strip">🔒 이름 · 연락처 · 주민등록번호 등 개인정보는 입력하지 않아도 검색할 수 있습니다.</p>
  </section>

  <section class="results" id="results">
    <div class="results-head">
      <div class="q">검색어</div>
      <h2>"<span id="queryEcho"></span>" 검색 결과</h2>
      <div class="homelink" id="backHome">← 처음 화면으로</div>
    </div>

    <div id="warnSlot"></div>

    <div class="facetbar" id="facetbar" style="display:none;">
      <label>지역 <select id="facetRegion"><option value="">전체</option></select></label>
      <label>분야 <select id="facetCategory"><option value="">전체</option></select></label>
      <label class="chk"><input type="checkbox" id="facetFree"> 자부담 없는 서비스만</label>
    </div>

    <div class="recentbar" id="recentbar"></div>

    <div id="resultBody"></div>
  </section>
</div>

}

function norm(s){ return (s||'').toString().replace(/\s+/g,'').toLowerCase(); }

/* ---------- PII ---------- */
function detectPII(text){
  const found = [];
  if(/\d{6}\s*-\s*\d{7}/.test(text)) found.push('주민등록번호로 보이는 번호');
  if(/01[0-9][-\s]?\d{3,4}[-\s]?\d{4}/.test(text) || /0\d{1,2}[-\s]\d{3,4}[-\s]\d{4}/.test(text)) found.push('전화번호로 보이는 번호');
  if(/\d+\s*(번지|동\s*\d+\s*호|호)\b/.test(text)) found.push('상세 주소(동·호수 등)');
  if(/(이름은|성함은|주민등록번호|생년월일)/.test(text)) found.push('이름·생년월일 등 개인 식별정보');
  return found;
}
function redact(text){
  return text
    .replace(/\d{6}\s*-\s*\d{7}/g,'[비공개]')
    .replace(/01[0-9][-\s]?\d{3,4}[-\s]?\d{4}/g,'[비공개]')
    .replace(/0\d{1,2}[-\s]\d{3,4}[-\s]\d{4}/g,'[비공개]')
    .replace(/\d+\s*(번지|동\s*\d+\s*호|호)\b/g,'[비공개]');
}

/* ---------- search ---------- */
function runSearch(rawQuery){
  const qn = norm(rawQuery);
  const detectedRegions = REGIONS.filter(r => qn.includes(norm(r)));
  const wantsFree = /무료|자부담\s*없|부담없|자부담x/i.test(rawQuery);
  const wantsPaidOk = /자부담\s*있/i.test(rawQuery);

  const scored = DB.map(row=>{
    let score = 0;
    const reasons = [];
    const tags = (row['AI검색태그']||'').split(',').map(t=>t.trim()).filter(Boolean);
    let tagHit = false;
    tags.forEach(t=>{ if(t && qn.includes(norm(t))){ score += 2; tagHit = true; } });

    const catN = norm(row['대분류']);
    if(catN && qn.includes(catN)){ score += 3; reasons.push('서비스 분야'); }
    const subN = norm(row['중분류']);
    if(subN && qn.includes(subN)) score += 2;
    const nameN = norm(row['서비스명/사업명']);
    if(nameN && qn.includes(nameN)){ score += 4; reasons.push('서비스명'); }
    const orgN = norm(row['수행기관']);
    if(orgN && orgN.length>=3 && qn.includes(orgN)){ score += 3; reasons.push('기관명'); }

    let targetHit = false;
    TARGET_KEYWORDS.forEach(k=>{
      if(qn.includes(norm(k))){
        if((row['세부대상자']||'').includes(k) || (row['AI검색태그']||'').includes(k)){ score += 2; targetHit = true; }
      }
    });
    if(targetHit) reasons.push('대상자 조건');
    if(tagHit && reasons.length===0) reasons.push('키워드');

    if(detectedRegions.length>0){
      const regionFieldN = norm(row['서비스 가능지역']);
      const matched = detectedRegions.some(r=> regionFieldN.includes(norm(r)));
      const wide = /전지역|전역/.test(row['서비스 가능지역']||'');
      if(matched){ score += 5; reasons.unshift('지역'); }
      else if(wide){ score += 2; reasons.unshift('세종시 전지역'); }
    }

    if(wantsFree){
      if(row['자부담']==='X'){ score += 3; reasons.push('자부담 없음'); }
      else if(row['자부담']==='O') score -= 3;
    }
    if(wantsPaidOk && row['자부담']==='O') score += 1;

    return {row, score, reasons};
  });

  scored.sort((a,b)=> b.score - a.score);
  return scored.filter(s=> s.score > 0);
}

/* ---------- state ---------- */
let lastResults = [];
let recentQueries = [];

const heroEl = document.getElementById('hero');
const resultsEl = document.getElementById('results');
const topbarEl = document.getElementById('topbar');
const resultBody = document.getElementById('resultBody');
const facetbar = document.getElementById('facetbar');
const facetRegion = document.getElementById('facetRegion');
const facetCategory = document.getElementById('facetCategory');
const facetFree = document.getElementById('facetFree');
const recentbar = document.getElementById('recentbar');
const warnSlot = document.getElementById('warnSlot');

REGIONS.forEach(r=>{ const o=document.createElement('option'); o.value=r; o.textContent=r; facetRegion.appendChild(o); });
CATEGORIES.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; facetCategory.appendChild(o); });

function esc(s){
  return (s===undefined||s===null||s==='') ? '자료상 확인 필요' :
    String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function payCell(v){
  if(v==='X') return {text:'자부담 없음', cls:'pay-free'};
  if(v==='O') return {text:'자부담 있음', cls:'pay-paid'};
  return {text:'자료상 확인 필요', cls:'check'};
}

function renderCard(row, rank, total, reasons){
  const pay = payCell(row['자부담']);
  const tel = row['연락처'] || '';
  const telHTML = tel ? `<a class="tel-link" href="tel:${tel.replace(/[^0-9]/g,'')}">${esc(tel)}</a>` : esc(tel);
  const matchHTML = (reasons&&reasons.length) ? `<div class="rcard-match">일치 조건 · ${reasons.slice(0,3).join(' · ')}</div>` : '';
  return `
  <div class="rcard">
    <div class="rcard-top">
      <span class="rcard-rank">${rank} / ${total}</span>
      <span class="rcard-cat">${esc(row['대분류'])} · ${esc(row['중분류'])}</span>
    </div>
    <div class="rcard-title">${esc(row['서비스명/사업명'])}</div>
    ${matchHTML}
    <table class="fields">
      <tr><th>1. 추천 서비스</th><td>${esc(row['서비스명/사업명'])} (${esc(row['대분류'])} · ${esc(row['중분류'])})</td></tr>
      <tr><th>2. 제공기관</th><td>${esc(row['수행기관'])}${row['비고']?` · ${esc(row['비고'])}`:''}</td></tr>
      <tr><th>3. 가능지역</th><td>${esc(row['서비스 가능지역'])}</td></tr>
      <tr><th>4. 대상자 조건</th><td>${esc(row['세부대상자'])}</td></tr>
      <tr><th>5. 자부담 여부</th><td class="${pay.cls}">${pay.text}${row['서비스 규모(정원)']?` · 규모 ${esc(row['서비스 규모(정원)'])}`:''}</td></tr>
      <tr><th>6. 주소</th><td>${esc(row['주소'])}</td></tr>
      <tr><th>7. 연락처</th><td>${telHTML}</td></tr>
      <tr><th>8. 확인 필요사항</th><td class="check">자부담 금액·정원·신청절차는 담당기관에 최종 확인 필요 (자료기준일 ${esc(row['자료기준일'])})</td></tr>
    </table>
  </div>`;
}

function applyFacets(base){
  let arr = base;
  if(facetRegion.value){
    arr = arr.filter(x => norm(x.row['서비스 가능지역']).includes(norm(facetRegion.value)) || /전지역|전역/.test(x.row['서비스 가능지역']||''));
  }
  if(facetCategory.value){
    arr = arr.filter(x => x.row['대분류'] === facetCategory.value);
  }
  if(facetFree.checked){
    arr = arr.filter(x => x.row['자부담'] === 'X');
  }
  return arr;
}

function renderResultBody(){
  const filtered = applyFacets(lastResults);
  let html = '';

  if(lastResults.length === 0){
    html = `<div class="empty-box">
      <div class="bigicon">${icon('search')}</div>
      <h4>현재 DB에서 확인되지 않습니다</h4>
      <p>지역명(예: 조치원읍), 서비스 종류(예: 방문진료, 이동지원, 주거환경개선),<br>대상자 조건(예: 독거노인, 장애인, 퇴원환자) 중 하나를 포함해 다시 검색해 주세요.</p>
    </div>`;
    resultBody.innerHTML = html;
    facetbar.style.display = 'none';
    return;
  }

  facetbar.style.display = 'flex';

  if(filtered.length === 0){
    resultBody.innerHTML = `<div class="empty-box">
      <div class="bigicon">${icon('search')}</div>
      <h4>선택한 조건에 맞는 자원이 없습니다</h4>
      <p>지역 · 분야 · 자부담 필터를 조정해 보세요.</p>
    </div>`;
    return;
  }

  const top = filtered.slice(0, 6);
  html += `<div class="result-count">전체 <b>${lastResults.length}건</b> 중 조건에 맞는 <b>${filtered.length}건</b>을 일치도 순으로 표시합니다.</div>`;
  html += '<div class="cards">';
  top.forEach((r,i)=>{ html += renderCard(r.row, i+1, filtered.length, r.reasons); });
  html += '</div>';
  if(filtered.length > top.length){
    html += `<p class="morehint">이 외 ${filtered.length - top.length}건이 더 있습니다. 검색어나 필터를 좁혀 결과를 정리해 보세요.</p>`;
  }
  html += `<div class="foot-note">※ 세종시 통합돌봄 지역자원 DB(2026년 기준) 검색 결과입니다. 실제 서비스 연계 전 반드시 담당기관에 최종 확인이 필요합니다.</div>`;

  resultBody.innerHTML = html;
}

function renderRecent(){
  recentbar.innerHTML = '';
  if(recentQueries.length <= 1) return;
  const lbl = document.createElement('span'); lbl.className='lbl'; lbl.textContent='최근 검색'; recentbar.appendChild(lbl);
  recentQueries.slice(0,6).forEach(q=>{
    const b = document.createElement('button'); b.className='rchip'; b.textContent = q;
    b.onclick = ()=> handleQuery(q);
    recentbar.appendChild(b);
  });
}

function handleQuery(raw){
  const text = (raw||'').trim();
  if(!text) return;

  const piiFound = detectPII(text);
  const searchText = piiFound.length ? redact(text) : text;

  if(!recentQueries.includes(text)) recentQueries.unshift(text);
  recentQueries = recentQueries.slice(0,6);

  document.getElementById('queryEcho').textContent = text;
  document.getElementById('heroInput').value = '';
  document.getElementById('topInput').value = text;

  heroEl.style.display = 'none';
  topbarEl.classList.add('show');
  resultsEl.classList.add('show');
  window.scrollTo(0,0);

  warnSlot.innerHTML = '';
  if(piiFound.length){
    warnSlot.innerHTML = `<div class="warn-box">🔒 입력하신 내용에 <b>${piiFound.join(', ')}</b>(으)로 보이는 정보가 포함되어 있습니다. 서비스 검색에는 개인정보 입력이 필요하지 않습니다. 지역·대상자 조건·서비스 종류만 입력해 주세요. 해당 부분은 제외하고 검색합니다.</div>`;
  }

  facetRegion.value = ''; facetCategory.value=''; facetFree.checked=false;
  lastResults = runSearch(searchText);
  renderResultBody();
  renderRecent();
}

function goHome(){
  heroEl.style.display = '';
  topbarEl.classList.remove('show');
  resultsEl.classList.remove('show');
  window.scrollTo(0,0);
}

document.getElementById('heroSendBtn').onclick = ()=> handleQuery(document.getElementById('heroInput').value);
document.getElementById('heroInput').addEventListener('keydown', e=>{ if(e.key==='Enter') handleQuery(e.target.value); });
document.getElementById('topSendBtn').onclick = ()=> handleQuery(document.getElementById('topInput').value);
document.getElementById('topInput').addEventListener('keydown', e=>{ if(e.key==='Enter') handleQuery(e.target.value); });
document.getElementById('backHome').onclick = goHome;
document.getElementById('brandHome').onclick = goHome;
facetRegion.addEventListener('change', renderResultBody);
facetCategory.addEventListener('change', renderResultBody);
facetFree.addEventListener('change', renderResultBody);

const examplesEl = document.getElementById('examples');
QUICK_EXAMPLES.forEach(q=>{
  const b = document.createElement('button'); b.className='exchip'; b.textContent = q;
  b.onclick = ()=> handleQuery(q);
  examplesEl.appendChild(b);
});

const tilesEl = document.getElementById('tiles');
CATEGORIES.forEach(cat=>{
  const cnt = DB.filter(d=>d['대분류']===cat).length;
  const t = document.createElement('div');
  t.className='tile';
  t.innerHTML = `<div class="ic">${icon(CATEGORY_ICON[cat]||'dots')}</div><span>${cat}</span><small>${cnt}건</small>`;
  t.onclick = ()=> handleQuery(cat + ' 서비스');
  tilesEl.appendChild(t);
});

document.getElementById('dbCount').textContent = DB.length;
</script>
